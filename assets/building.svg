<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" fill="none">
  <style>
    .header-title { font-family: 'Courier New', Courier, monospace; font-weight: 700; font-size: 20px; fill: #ffffff; }
    .proj-title { font-family: 'Segoe UI', Ubuntu, Sans-Serif; font-weight: 700; font-size: 15px; fill: #ffffff; }
    .proj-tech { font-family: 'Segoe UI', Ubuntu, Sans-Serif; font-weight: 500; font-size: 11px; fill: #bb86fc; }
    .proj-percent { font-family: 'Segoe UI', Ubuntu, Sans-Serif; font-weight: 600; font-size: 12px; fill: #e1e1e8; text-anchor: end; }
    .status-text { font-family: 'Segoe UI', Ubuntu, Sans-Serif; font-weight: 700; font-size: 11px; text-anchor: middle; }
    .footer-label { font-family: 'Courier New', Courier, monospace; font-weight: 700; font-size: 12px; fill: #bb86fc; }
    .footer-pill-text { font-family: 'Courier New', Courier, monospace; font-weight: 600; font-size: 12px; fill: #e1e1e8; text-anchor: middle; }
    .glow-border { stroke: #9d4edd; stroke-width: 2; filter: blur(1px); }
    .border { stroke: #bb86fc; stroke-width: 1; }
  </style>

  <!-- Background Card -->
  <rect width="800" height="520" rx="12" fill="#0d0e15" stroke="#1d2036" stroke-width="2" />
  <rect x="15" y="15" width="770" height="490" rx="10" fill="none" class="glow-border" />
  <rect x="15" y="15" width="770" height="490" rx="10" fill="none" class="border" />

  <!-- Header Title -->
  <g transform="translate(40, 42)">
    <text class="header-title">📋 ACTIVE DEVELOPMENT BOARD // v4.0</text>
  </g>

  <!-- Projects Grid -->
  <!-- Project 1: ResqLink -->
  <g transform="translate(40, 70)">
    <rect width="720" height="70" rx="8" fill="#121320" stroke="#3c096c" stroke-width="1" />
    <text x="20" y="25" class="proj-title">🛡️ ResqLink</text>
    <text x="20" y="42" class="proj-tech">React • Node.js • WebSockets</text>
    <!-- Progress Bar -->
    <rect x="220" y="32" width="340" height="12" rx="6" fill="#1b1c2e" />
    <rect x="220" y="32" width="272" height="12" rx="6" fill="url(#purple-grad-1)" /> <!-- 80% -->
    <text x="590" y="42" class="proj-percent">80%</text>
    <!-- Status Badge -->
    <rect x="610" y="20" width="90" height="26" rx="13" fill="#ffb703" fill-opacity="0.15" stroke="#ffb703" stroke-width="1" />
    <text x="655" y="36" class="status-text" fill="#ffb703">In Progress</text>
  </g>

  <!-- Project 2: TLS Auditor -->
  <g transform="translate(40, 150)">
    <rect width="720" height="70" rx="8" fill="#121320" stroke="#3c096c" stroke-width="1" />
    <text x="20" y="25" class="proj-title">🔍 TLS Auditor</text>
    <text x="20" y="42" class="proj-tech">Python • Scapy • Cryptography</text>
    <!-- Progress Bar -->
    <rect x="220" y="32" width="340" height="12" rx="6" fill="#1b1c2e" />
    <rect x="220" y="32" width="204" height="12" rx="6" fill="url(#purple-grad-2)" /> <!-- 60% -->
    <text x="590" y="42" class="proj-percent">60%</text>
    <!-- Status Badge -->
    <rect x="610" y="20" width="90" height="26" rx="13" fill="#ff007f" fill-opacity="0.15" stroke="#ff007f" stroke-width="1" />
    <text x="655" y="36" class="status-text" fill="#ff007f">In Progress</text>
  </g>

  <!-- Project 3: AgriTrace -->
  <g transform="translate(40, 230)">
    <rect width="720" height="70" rx="8" fill="#121320" stroke="#3c096c" stroke-width="1" />
    <text x="20" y="25" class="proj-title">🌾 AgriTrace</text>
    <text x="20" y="42" class="proj-tech">HTML5 • CSS3 • JavaScript • Web App</text>
    <!-- Progress Bar -->
    <rect x="220" y="32" width="340" height="12" rx="6" fill="#1b1c2e" />
    <rect x="220" y="32" width="340" height="12" rx="6" fill="url(#purple-grad-3)" /> <!-- 100% -->
    <text x="590" y="42" class="proj-percent">100%</text>
    <!-- Status Badge -->
    <rect x="610" y="20" width="90" height="26" rx="13" fill="#38ef7d" fill-opacity="0.15" stroke="#38ef7d" stroke-width="1" />
    <text x="655" y="36" class="status-text" fill="#38ef7d">Live</text>
  </g>

  <!-- Project 4: Nexus Twin -->
  <g transform="translate(40, 310)">
    <rect width="720" height="70" rx="8" fill="#121320" stroke="#3c096c" stroke-width="1" />
    <text x="20" y="25" class="proj-title">🌐 Nexus Twin</text>
    <text x="20" y="42" class="proj-tech">React • Three.js • IoT Core</text>
    <!-- Progress Bar -->
    <rect x="220" y="32" width="340" height="12" rx="6" fill="#1b1c2e" />
    <rect x="220" y="32" width="340" height="12" rx="6" fill="url(#purple-grad-3)" /> <!-- 100% -->
    <text x="590" y="42" class="proj-percent">100%</text>
    <!-- Status Badge -->
    <rect x="610" y="20" width="90" height="26" rx="13" fill="#38ef7d" fill-opacity="0.15" stroke="#38ef7d" stroke-width="1" />
    <text x="655" y="36" class="status-text" fill="#38ef7d">Live</text>
  </g>

  <!-- Project 5: Tuskres -->
  <g transform="translate(40, 390)">
    <rect width="720" height="70" rx="8" fill="#121320" stroke="#3c096c" stroke-width="1" />
    <text x="20" y="25" class="proj-title">🐘 Tuskres</text>
    <text x="20" y="42" class="proj-tech">Concept • Node.js • Wildlife Protection</text>
    <!-- Progress Bar -->
    <rect x="220" y="32" width="340" height="12" rx="6" fill="#1b1c2e" />
    <rect x="220" y="32" width="102" height="12" rx="6" fill="url(#purple-grad-4)" /> <!-- 30% -->
    <text x="590" y="42" class="proj-percent">30%</text>
    <!-- Status Badge -->
    <rect x="610" y="20" width="90" height="26" rx="13" fill="#00b4d8" fill-opacity="0.15" stroke="#00b4d8" stroke-width="1" />
    <text x="655" y="36" class="status-text" fill="#00b4d8">Ideation</text>
  </g>

  <!-- Footer Skills -->
  <g transform="translate(40, 475)">
    <text class="footer-label" y="18">Currently Learning :</text>
    
    <!-- React Pill -->
    <g transform="translate(180, 0)">
      <rect width="80" height="26" rx="13" fill="#bb86fc" fill-opacity="0.1" stroke="#bb86fc" stroke-width="1" />
      <text x="40" y="17" class="footer-pill-text">React</text>
    </g>
    <!-- Node.js Pill -->
    <g transform="translate(270, 0)">
      <rect width="85" height="26" rx="13" fill="#9d4edd" fill-opacity="0.1" stroke="#9d4edd" stroke-width="1" />
      <text x="42" y="17" class="footer-pill-text">Node.js</text>
    </g>
    <!-- Cyber Security Pill -->
    <g transform="translate(365, 0)">
      <rect width="135" height="26" rx="13" fill="#ff007f" fill-opacity="0.1" stroke="#ff007f" stroke-width="1" />
      <text x="67" y="17" class="footer-pill-text">Cybersecurity</text>
    </g>
  </g>

  <!-- Gradients -->
  <defs>
    <linearGradient id="purple-grad-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>
    <linearGradient id="purple-grad-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf" />
      <stop offset="100%" stop-color="#5a189a" />
    </linearGradient>
    <linearGradient id="purple-grad-3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7b2cbf" />
      <stop offset="100%" stop-color="#38ef7d" />
    </linearGradient>
    <linearGradient id="purple-grad-4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3c096c" />
      <stop offset="100%" stop-color="#7b2cbf" />
    </linearGradient>
  </defs>
</svg>
